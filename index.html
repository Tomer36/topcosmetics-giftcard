<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Top Cosmetics - Gift Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;background:#f5ebe0;font-family:sans-serif;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px;
}
h1{color:#8b5e3c;font-size:1rem;font-weight:400;text-align:center;margin-top:4px}
.tpl-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1.5px solid #c9a882;margin-bottom:2px}
.tpl-tab{padding:9px 16px;font-size:0.85rem;cursor:pointer;background:#fff;color:#8b5e3c;border:none;font-weight:700}
.tpl-tab.active{background:#9b5e6a;color:#fff}
.form{
  width:100%;max-width:400px;background:#fff;border-radius:12px;
  padding:18px;box-shadow:0 4px 20px rgba(139,94,60,0.12);
  display:flex;flex-direction:column;gap:10px;
}
.form label{display:block;color:#8b5e3c;font-size:0.82rem;margin-bottom:3px;font-weight:700}
.form input,.form textarea{
  width:100%;border:1.5px solid #ddc9b4;border-radius:8px;padding:10px 12px;
  font-size:0.9rem;color:#5a3e2b;background:#faf7f4;outline:none;font-family:'Cairo',sans-serif;
}
.form textarea{resize:none;height:55px}
.form input:focus,.form textarea:focus{border-color:#9b5e6a}
.btn{
  width:100%;font-size:1rem;padding:13px;border:none;border-radius:10px;cursor:pointer;
  background:#9b5e6a;color:#fff;font-weight:700;
}
.btn:active{background:#7d4a54}
.btn.loading{opacity:0.5;pointer-events:none}
.preview{
  width:100%;max-width:600px;border-radius:8px;overflow:hidden;
  box-shadow:0 4px 20px rgba(139,94,60,0.15);position:relative;
}
.preview canvas{width:100%;height:auto;display:block}
.hidden{display:none!important}
#inWish{font-size:0.9rem}
</style>
</head>

<h1>🎁 Top Cosmetics — Gift ZOBEEEEEEEEE</h1>

<div class="tpl-tabs">
  <button class="tpl-tab active" id="tplBtn1" onclick="switchTemplate(1)">Template 1</button>
  <button class="tpl-tab" id="tplBtn2" onclick="switchTemplate(2)">Template 2 + Wish</button>
</div>

    <button class="btn" id="shareBtn" onclick="shareCard()" style="flex:1;background:#25D366">📤 Share</button>
  </div>
</div>

var FONT = "Cairo";
var FONT_SIZE = 60;

var POS = {
  to:   {x:1299, y:198},
  for1: {x:1299, y:343},
  for2: {x:1299, y:463},
  for3: {x:1299, y:583},
  from: {x:1299, y:723}
};
var WISH_POS = {x:367, y:225};
var WISH_BOX_W = 620;
var WISH_BOX_H = 500;
var WISH_FONT_SIZE = 45;
var WISH_MIN_FONT = 20;

var cv = document.getElementById("cv");
var ctx = cv.getContext("2d");
cv.width = IMG_W; cv.height = IMG_H;

var currentTpl = 1;
var tpl1Img = new Image();
var tpl2Img = new Image();
var tpl1Ready = false, tpl2Ready = false;
var fontLoaded = false;

document.fonts.ready.then(function(){ fontLoaded = true; drawCard(); });
tpl1Img.onload = function(){ tpl1Ready = true; drawCard(); };
tpl2Img.onload = function(){ tpl2Ready = true; drawCard(); };
tpl1Img.src = TPL1_SRC;
tpl2Img.src = TPL2_SRC;

function switchTemplate(n){
  currentTpl = n;
  document.getElementById("tplBtn1").classList.toggle("active", n===1);
  document.getElementById("tplBtn2").classList.toggle("active", n===2);
  document.getElementById("wishGroup").classList.toggle("hidden", n!==2);
  drawCard();
}

function wrapBox(text, fontSize, maxW){
  var paragraphs = text.split(/\r?\n|\r/);
  var allLines = [];
  ctx.font = "600 " + fontSize + "px '" + FONT + "', sans-serif";
  for(var p = 0; p < paragraphs.length; p++){
    var words = paragraphs[p].split(/\s+/).filter(function(w){ return w.length > 0; });
    if(words.length === 0){ allLines.push(""); continue; }
    var line = words[0];
    for(var i = 1; i < words.length; i++){
      var test = line + " " + words[i];
      if(ctx.measureText(test).width <= maxW){
        line = test;
      } else {
        allLines.push(line);
        line = words[i];
      }
    }
    allLines.push(line);
  }
  return allLines;
}

function drawCard(){
  if(!fontLoaded) return;
  if(currentTpl === 1 && !tpl1Ready) return;
  if(currentTpl === 2 && !tpl2Ready) return;

  ctx.clearRect(0, 0, IMG_W, IMG_H);
  var img = (currentTpl === 1) ? tpl1Img : tpl2Img;
  ctx.drawImage(img, 0, 0, IMG_W, IMG_H);

  var toVal = document.getElementById("inTo").value;
  var forText = document.getElementById("inFor").value;
  var fromVal = document.getElementById("inFrom").value;
  var forLines = forText.split(/\r?\n|\r/);

  ctx.fillStyle = "#4a3525";
  ctx.textBaseline = "bottom";
  ctx.textAlign = "center";
  ctx.direction = "rtl";
  ctx.font = "600 " + FONT_SIZE + "px '" + FONT + "', sans-serif";

  if(toVal)       ctx.fillText(toVal, POS.to.x, POS.to.y);
  if(forLines[0]) ctx.fillText(forLines[0], POS.for1.x, POS.for1.y);
  if(forLines[1]) ctx.fillText(forLines[1], POS.for2.x, POS.for2.y);
  if(forLines[2]) ctx.fillText(forLines[2], POS.for3.x, POS.for3.y);
  if(fromVal)     ctx.fillText(fromVal, POS.from.x, POS.from.y);

  // Wish field - template 2 only
  if(currentTpl === 2){
    var wishVal = document.getElementById("inWish").value;
    if(wishVal){
      var fs = WISH_FONT_SIZE;
      var lines, totalH;
      while(fs >= WISH_MIN_FONT){
        lines = wrapBox(wishVal, fs, WISH_BOX_W);
        totalH = lines.length * (fs * 1.4);
        if(totalH <= WISH_BOX_H) break;
        fs -= 2;
      }
      var lineH = fs * 1.4;
      var startY = WISH_POS.y;
      ctx.font = "600 " + fs + "px '" + FONT + "', sans-serif";
      ctx.fillStyle = "#4a3525";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.direction = "rtl";
      for(var i = 0; i < lines.length; i++){
        ctx.fillText(lines[i], WISH_POS.x, startY + i * lineH);
      }
      // Reset baseline for consistency
      ctx.textBaseline = "bottom";
    }
  }
}

function download(){
  var btn = document.getElementById("dlBtn");
  btn.classList.add("loading");
  btn.textContent = "Generating...";
  drawCard();
  setTimeout(function(){
    var name = document.getElementById("inTo").value || "giftcard";
    var link = document.createElement("a");
    link.download = "TopCosmetics_GiftCard_" + name.replace(/\s+/g,"_") + ".png";
    link.href = cv.toDataURL("image/png");
    link.click();
    btn.classList.remove("loading");
    btn.textContent = "⬇ Download Gift Card";
  }, 300);
}
async function shareCard(){
  var btn = document.getElementById("shareBtn");
  btn.classList.add("loading");
  btn.textContent = "Preparing...";
  drawCard();
  try {
    var blob = await new Promise(function(res){ cv.toBlob(res, "image/png"); });
    var name = document.getElementById("inTo").value || "giftcard";
    var file = new File([blob], "TopCosmetics_GiftCard_" + name.replace(/\s+/g,"_") + ".png", {type:"image/png"});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:"Top Cosmetics Gift Card"});
    } else {
      alert("Sharing is not supported on this browser. Use the Download button instead.");
    }
  } catch(e){
    if(e.name !== "AbortError") alert("Could not share: " + e.message);
  }
  btn.classList.remove("loading");
  btn.textContent = "📤 Share";
}
</script>
